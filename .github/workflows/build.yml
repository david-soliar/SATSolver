name: Build SATSolver


on:
  push:
    paths-ignore: ["**.md", "LICENSE"]
  pull_request:
    paths-ignore: ["**.md", "LICENSE"]


jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: checkout
        uses: actions/checkout@v4

      - name: set up java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: maven

      - name: maven build
        run: mvn clean package

      - name: upload jar
        uses: actions/upload-artifact@v4
        with:
          name: SATSolver-jar
          path: target/*.jar

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
        contents: write

    steps:
      - name: download artifacts
        uses: actions/download-artifact@v4
        with:
          name: SATSolver-jar
          path: dist

      - name: generate version from jar
        id: ver
        run: |
          jar=$(ls dist/*.jar | head -n 1)
          base=$(basename "$jar")

          # A.B
          version_ab=$(echo "$base" | sed -E 's/SATSolver-([0-9]+\.[0-9]+)\.jar/\1/')

          # + .C
          version="${version_ab}.${{ github.run_number }}"

          echo "version=$version" >> $GITHUB_OUTPUT

      - name: create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.ver.outputs.version }}
          name: SATSolver v${{ steps.ver.outputs.version }}
          files: dist/*.jar
